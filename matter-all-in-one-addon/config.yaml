name: "Matter All-in-One Bridge"
description: "Expose Home Assistant entities through one stable Matter bridge with HomeKit-compatible mappings."
version: "1.2.4"
slug: "matter_all_in_one_bridge"
init: false
host_network: true
ingress: true
ingress_port: 8283
arch:
  - amd64
  - aarch64
ports:
  8283/tcp: 8283
ports_description:
  8283/tcp: Matterbridge Web UI
hassio_api: true
homeassistant_api: true
hassio_role: admin
options: {}
schema:
  host: str?
  token: str?
  mdnsinterface: str?
  ipv4_only: bool?
