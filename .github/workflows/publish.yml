name: Publish to NPM

on:
  release:
    types: [created]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # needed for npm provenance / trusted publishing

jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./matter-all-in-one-addon
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'
          cache-dependency-path: './matter-all-in-one-addon/package-lock.json'

      - name: Install dependencies
        run: npm ci --no-fund --no-audit

      - name: Build plugin
        run: npm run build

      - name: Run unit tests
        run: npm run test

      - name: Publish to NPM
        run: npm publish --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
