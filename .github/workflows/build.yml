name: Build and Test

on:
  push:
    branches: [ main ]
    paths-ignore:
      - '**/*.md'
  pull_request:
    branches: [ main ]
    paths-ignore:
      - '**/*.md'
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: ./matter-all-in-one-addon

    strategy:
      fail-fast: false
      matrix:
        node-version: [22.x]
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: './matter-all-in-one-addon/package-lock.json'

      - name: Install dependencies
        run: npm ci --no-fund --no-audit

      - name: Build plugin
        run: npm run build

      - name: Lint code
        run: npm run lint

      - name: Run unit tests
        run: npm run test
